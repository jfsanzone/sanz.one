<script>
(function(){try{var t=localStorage.getItem('theme');if(t){document.documentElement.setAttribute('data-theme',t)}else if(window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark')}else{document.documentElement.setAttribute('data-theme','light')}}catch(e){document.documentElement.setAttribute('data-theme','light')}})();
</script>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #efefef;
    --text: #222222;
    --text-muted: rgba(34, 34, 34, 0.65);
    --icon-hover: #000000;
  }

  [data-theme="dark"] {
    --bg: #141414;
    --text: #e0e0e0;
    --text-muted: rgba(224, 224, 224, 0.53);
    --icon-hover: #ffffff;
  }

  html, body {
    height: 100%;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: var(--bg);
    font-family: system-ui, -apple-system, sans-serif;
    color: var(--text);
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 24px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text);
    opacity: 0.5;
    transition: opacity 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .theme-toggle:hover {
    opacity: 1;
  }

  .theme-toggle svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .icon-sun { display: none; }
  .icon-moon { display: block; }
  [data-theme="dark"] .icon-sun { display: block; }
  [data-theme="dark"] .icon-moon { display: none; }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .name {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 34px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text);
    user-select: none;
  }

  .socials {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .socials a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    transition: color 0.18s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .socials a:nth-child(1) { animation: colorCycle 20s infinite ease-in-out; }
  .socials a:nth-child(2) { animation: colorCycle 20s infinite ease-in-out -5s; }
  .socials a:nth-child(3) { animation: colorCycle 20s infinite ease-in-out -10s; }
  .socials a:nth-child(4) { animation: colorCycle 20s infinite ease-in-out -15s; }

  @keyframes colorCycle {
    0%, 100% { color: #b84400; }
    16.6%    { color: #7b2dbf; }
    33.3%    { color: #0e7a4e; }
    50%      { color: #c4175a; }
    66.6%    { color: #1569cf; }
    83.3%    { color: #a35800; }
  }

  [data-theme="dark"] .socials a:nth-child(1) { animation-name: colorCycleDark; }
  [data-theme="dark"] .socials a:nth-child(2) { animation-name: colorCycleDark; }
  [data-theme="dark"] .socials a:nth-child(3) { animation-name: colorCycleDark; }
  [data-theme="dark"] .socials a:nth-child(4) { animation-name: colorCycleDark; }

  @keyframes colorCycleDark {
    0%, 100% { color: #d15d19; }
    16.6%    { color: #a759eb; }
    33.3%    { color: #249064; }
    50%      { color: #e73a7d; }
    66.6%    { color: #2b7fe5; }
    83.3%    { color: #b96e11; }
  }

  .socials a:hover {
    color: var(--icon-hover) !important;
    animation-play-state: paused;
  }

  .socials a:active {
    color: var(--text) !important;
  }

  .socials svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .socials a:first-child svg {
    width: 24px;
    height: 24px;
  }

  @media (prefers-reduced-motion: reduce) {
    .socials a:nth-child(1),
    .socials a:nth-child(2),
    .socials a:nth-child(3),
    .socials a:nth-child(4) {
      animation: none;
      color: var(--text);
      opacity: 0.5;
    }
  }



  @media (max-width: 480px) {
    .name {
      font-size: 24px;
    }
    .socials {
      gap: 20px;
    }
  }
</style>

    <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      try{localStorage.setItem('theme',next)}catch(e){}
    }
    // Theme already set by blocking head script
  </script>
