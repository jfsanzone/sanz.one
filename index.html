<html lang="en" data-theme="dark">

<title>Sanzone</title>

<meta property="og:title" content="Sanzone">
<meta property="og:description" content="Jason Sanzone / Executive Design Leader focused on Product, Growth, and AI Systems.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* Dark mode (default) */
  :root, [data-theme="dark"] {
    --bg: #080808;
    --text: #f0f0f0;
    --text-body: rgba(240, 240, 240, 0.72);
    --text-muted: rgba(240, 240, 240, 0.55);
    --border: rgba(240, 240, 240, 0.07);
    --wordmark: #b0b0b0;
    --wordmark-hover: #f0f0f0;
  }

  /* Light mode */
  [data-theme="light"] {
    --bg: #f2f0eb;
    --text: #111111;
    --text-body: rgba(17, 17, 17, 0.70);
    --text-muted: rgba(17, 17, 17, 0.60);
    --border: rgba(17, 17, 17, 0.08);
    --wordmark: #555555;
    --wordmark-hover: #111111;
  }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: background-color 0.25s ease, color 0.25s ease;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }

  a { color: inherit; text-decoration: none; }

  .page {
    position: relative;
    z-index: 1;
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
    padding: 0 32px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ---- Header ---- */
  .site-header {
    padding-top: 64px;
    padding-bottom: 48px;
    animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Tier 1: Identity row — name + toggle */
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .wordmark-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  /* Icon matches social icon size exactly */
  .wordmark-icon {
    width: 17px;
    height: 17px;
    color: var(--wordmark);
    flex-shrink: 0;
    transition: color 0.18s ease;
  }

  .wordmark-text {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--wordmark);
    line-height: 1;
    transition: color 0.18s ease;
  }

  .wordmark-link:hover .wordmark-icon { color: var(--wordmark-hover); }
  .wordmark-link:hover .wordmark-text { color: var(--wordmark-hover); }

  /* Theme toggle button */
  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    width: 36px;
    height: 36px;
    padding: 0;
    border-radius: 10px;
    transition: color 0.18s ease, border-color 0.18s ease, background-color 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .theme-toggle:hover {
    color: var(--text);
    border-color: var(--text-muted);
  }

  .theme-toggle svg {
    width: 13px;
    height: 13px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Tier 2: Role tagline — secondary, smaller, muted */
  .tagline {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.01em;
    color: var(--text-body);
    margin-top: 3px;
    line-height: 1.5;
  }

  /* Tier 3: Social links — tertiary, tightest */
  .socials {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 14px;
    margin-left: -10px;
  }

  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    color: var(--text-muted);
    transition: color 0.18s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .social-link:hover { color: var(--text); }

  .social-link svg {
    width: 17px;
    height: 17px;
    fill: currentColor;
  }

  /* ---- Journal section ---- */
  .section {
    padding: 44px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.55s 0.14s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .post-list { display: flex; flex-direction: column; }

  .post-item {
    padding: 18px 0;
    border-top: 1px solid var(--border);
  }

  .post-item:first-child {
    border-top: none;
    padding-top: 0;
  }

  .post-link {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
  }

  .post-link:hover .post-title { color: var(--text); }

  .post-title {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-body);
    line-height: 1.5;
    transition: color 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    flex: 1;
  }

  .post-date {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .section-footer { margin-top: 24px; }

  .all-posts-link {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: color 0.18s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .all-posts-link:hover { color: var(--text); }

  .all-posts-link svg {
    width: 11px;
    height: 11px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .all-posts-link:hover svg { transform: translateX(3px); }

  /* ---- Footer ---- */
  .site-footer {
    padding: 44px 0 64px;
    animation: fadeUp 0.55s 0.21s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .footer-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.45;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .page { padding: 0 24px; }
    .site-header { padding-top: 52px; padding-bottom: 48px; }
    .section { padding: 32px 0; }
    .site-footer { padding: 32px 0 52px; }
    .post-link { flex-direction: column; gap: 4px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

  <script>
    (function() {
      var html = document.documentElement;
      var btn = document.getElementById('themeToggle');
      var iconSun = document.getElementById('iconSun');
      var iconMoon = document.getElementById('iconMoon');

      // Restore saved preference
      var saved = localStorage.getItem('theme') || 'dark';
      html.setAttribute('data-theme', saved);
      updateIcons(saved);

      btn.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcons(next);
      });

      function updateIcons(theme) {
        if (theme === 'dark') {
          iconSun.style.display = '';
          iconMoon.style.display = 'none';
        } else {
          iconSun.style.display = 'none';
          iconMoon.style.display = '';
        }
      }
    })();
  </script>
