<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<script>
// GitHub Pages SPA redirect hack
// Stores the path in sessionStorage, then redirects to /
var path = window.location.pathname;
var query = window.location.search;
var hash = window.location.hash;
sessionStorage.setItem('spa-redirect', path + query + hash);
window.location.replace('/');
</script>
</head>
<body></body>
</html>
